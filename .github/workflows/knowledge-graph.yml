name: Deploy Knowledge Graph MCP

on:
  push:
    branches: [main]
    paths:
      - "services/knowledge-graph/**"
      - "packages/shared/**"
  pull_request:
    branches: [main]
    paths:
      - "services/knowledge-graph/**"
      - "packages/shared/**"

jobs:
  deploy:
    uses: ./.github/workflows/deploy-mcp-service.yml
    with:
      service-name: knowledge-graph-mcp
      service-path: services/knowledge-graph
