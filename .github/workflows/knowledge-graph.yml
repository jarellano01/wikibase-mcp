name: Knowledge Graph MCP

on:
  push:
    branches: [main]
    paths:
      - "services/knowledge-graph/**"
  pull_request:
    branches: [main]
    paths:
      - "services/knowledge-graph/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        working-directory: services/knowledge-graph
        run: pnpm install --frozen-lockfile
      - name: Build
        working-directory: services/knowledge-graph
        run: pnpm run build
      - name: Run tests
        working-directory: services/knowledge-graph
        run: pnpm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    env:
      IMAGE: docker.io/jarellano01/knowledge-graph-mcp
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=raw,value=dev-{{sha}},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=pr-${{ github.event.pull_request.number }},enable=${{ github.event_name == 'pull_request' }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/knowledge-graph/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
