[project]
name = "mcp-shared"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "starlette>=0.36.0",
    "asyncpg>=0.30.0",
    "alembic>=1.13.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0", "httpx>=0.27.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
